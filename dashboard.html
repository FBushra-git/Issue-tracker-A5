<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Issues Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.3/dist/full.min.css" rel="stylesheet"/>

</head>


<body class="bg-gray-100">

<!-- NAVBAR -->

<div class="navbar bg-white border-b flex flex-col md:flex-row md:items-center md:justify-between">

<div class="flex items-center gap-4 px-6 py-3">
    <img src="./assets/github-logo.png" class="w-10">

<h1 class="text-xl md:text-xl font-bold">
GitHub Issues Tracker
</h1>

</div>

<div class="flex flex-col sm:flex-row gap-2 p-4 md:p-6 w-full md:w-auto">

<input id="searchInput"
class="input input-bordered w-full sm:w-auto"
placeholder="Search issues...">

<button onclick="searchIssues()" class="btn btn-primary w-full sm:w-auto">
 Search Issue
</button>

</div>

</div>



<div class="max-w-6xl mx-auto mt-10 bg-gray-100 border border-dashed p-6">


<!-- TABS -->

<div class="flex flex-wrap p-4 md:p-6 p-6 gap-3 bg-white mb-6">

<button id="allBtn"
onclick="showAll()"
class="btn btn-primary px-6 md:px-10 py-2 md:py-3">
All
</button>

<button id="openBtn"
onclick="showOpen()"
class="btn btn-outline   px-6 md:px-10 py-2 md:py-3">
Open
</button>

<button id="closedBtn"
onclick="showClosed()"
class="btn btn-outline  px-6 md:px-10 py-2 md:py-3">
Closed
</button>

</div>



<!-- ISSUE HEADER -->

<div class="flex flex-col md:flex-row md:justify-between md:items-center bg-white p-4 md:p-8 rounded mb-6 gap-4">

<div class="flex items-center gap-3">

<div class="w-10 h-10 bg-purple-100 flex items-center justify-center rounded-full">
<img src="./assets/Aperture.png">
</div>

<div>

<h2 class="text-lg font-bold">
<span id="issueCount">0</span> Issues
</h2>

<p class="text-gray-500 text-sm">
Track and manage your project issues
</p>

</div>

</div>

<div class="flex gap-4 text-sm">

<span class="flex items-center gap-1">
<span class="w-3 h-3 bg-green-500 rounded-full"></span>
Open
</span>

<span class="flex items-center gap-1">
<span class="w-3 h-3 bg-purple-500 rounded-full"></span>
Closed
</span>

</div>

</div>



<!-- SPINNER -->

<!-- Loading Card -->
        <div
          id="loading-card"
          class="hidden fixed inset-0 flex items-center justify-center z-50"
        >
          <div
            class="bg-white p-6 rounded-xl shadow-lg w-40 h-40 flex items-center justify-center"
          >
            <span class="loading loading-dots loading-lg text-gray-500"></span>
          </div>
        </div>



<!-- ISSUE GRID -->

<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
</div>


</div>



<!-- MODAL -->

<dialog id="issueModal" class="modal">

<div class="modal-box w-[90%] max-w-lg lg:max-w-2xl rounded-xl p-4 sm:p-6 md:p-8">

<h3 id="mTitle" class="text-base sm:text-lg md:text-2xl font-semibold mb-2 truncate"></h3>

<p id="mStatus" class="flex flex-wrap items-center gap-3 text-[13px] lg:text-[15px] text-gray-500 mb-4"></p>
<div id="modal-tags" class="flex gap-2 mb-4"></div>

<p id="mDesc" class="text-gray-600 mb-6"></p>

<div class="grid grid-cols-2 gap-4 bg-gray-100 p-4 rounded">

<div>
<p class="text-sm text-gray-500">Assignee:</p>
<p id="mAuthor" class="font-semibold"></p>
</div>

<div>
<p class="text-sm text-gray-500 mb-2">Priority</p>
<p id="mPriority" class="badge bg-red-500 text-white border-none p-3.5"></p>
</div>

</div>

<div class="modal-action">

<form method="dialog">
<button class="btn border-none rounded-md bg-purple-600 text-white hover:bg-purple-700">Close</button>
</form>

</div>

</div>

</dialog>


<script src="script.js"></script>
<script src="./dashboard.js"></script>

</body>
</html>
