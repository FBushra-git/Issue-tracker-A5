<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- Tailwind + DaisuUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- Font Awesome Icon -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      
</head>
<body class="bg-[#F8F9FA] flex items-center justify-center min-h-screen ">

    <!-- Card Container -->
    <div class="bg-white p-10 rounded-lg shadow-sm border border-gray-100 w-full max-w-md">
        
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <!-- GitHub Icon -->
                <img src="./assets/github-logo.png" alt="" >
            </div>
            <h1 class="text-2xl font-semibold text-[#4A5568]">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <!-- Form Section -->
        <form action="#" class="space-y-5">
            <div>
                <label class="block text-gray-700 text-sm font-medium mb-1" for="username">Username</label>
                <input class="w-full px-4 py-2 border border-gray-300 rounded-md bg-[#FDFDFD] text-gray-800" 
                       type="text" id="username" placeholder="Enter Username">
                <span class="text-[11px] text-blue-400 mt-1 ">Default: admin</span>
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-medium mb-1" for="password">Password</label>
                <input class="w-full px-4 py-2 border border-gray-300 rounded-md bg-[#FDFDFD] text-gray-800" 
                       type="password" id="password" placeholder="Enter Password">
                <span class="text-[11px] text-blue-400 mt-1 ">Default: admin123</span>
            </div>

            <button type="submit" class="w-full bg-[#4267B2] hover:bg-[#365899] text-white font-medium py-2.5 rounded-md transition duration-200">
                Sign In
            </button>
        </form>

        <!-- Divider & Demo Credentials -->
        <div class="mt-8 text-center">
            <div class="relative flex items-center justify-center mb-6">
                <div class="border-t border-gray-200 w-full"></div>
                <span class="absolute bg-white px-3 text-[11px] text-gray-400 font-bold uppercase ">OR</span>
            </div>

            <div class="text-gray-500 text-sm">
                <p class="mb-3 text-xs uppercase  font-semibold text-gray-400">Demo Credentials:</p>
                <p class="font-bold text-gray-700">Username: <span class="font-normal">admin</span></p>
                <p class="font-bold text-gray-700">Password: <span class="font-normal">admin123</span></p>
            </div>
        </div>
    </div>

</body>
</html>
